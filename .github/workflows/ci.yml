name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check src/*.mjs bin/*.mjs
      - name: Import smoke test
        run: |
          node --input-type=module -e "
            import('./src/config.mjs').then(m => { if (!m.TELETEXT_CONFIG) throw new Error('TELETEXT_CONFIG missing'); });
            import('./src/generator.mjs').then(m => { if (!m.generateTeletext) throw new Error('generateTeletext missing'); });
            import('./src/tti-writer.mjs').then(m => { if (!m.buildPage) throw new Error('buildPage missing'); });
          "
